<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="HTML, CSS" />
    <meta name="description" content="This is a sample HTML document." />
    <title>My Second Web Page</title>
    <style>
      em {
        color: red;
        font-style: normal;
      }
    </style>
  </head>
  <body>
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>
    <p>This is a sample <em>paragraph</em>.</p>
    <!-- <em> is used to emphasize content in our HTML document. -->
    <p>This is a sample <i>paragraph</i>.</p>
    <!-- <i> is used to emphasize content in Italic in our HTML document.
        Also, <i> is deprecated and <em> should be used instead. -->
    <p>This is a sample <strong>paragraph</strong>.</p>
    <!-- <strong> is used to emphasize content in bold in our HTML document. -->
    <p>This is a sample <b>paragraph</b>.</p>
    <!-- <b> is used to emphasize content also in bold in our HTML document.
        Also, <b> is deprecated and <strong> should be used instead. -->

    <p>
      This document is written in &lt;HTML&gt;. &copy; 2026 My Website. All
      rights reserved.
    </p>
  </body>
</html>
