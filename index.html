<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="HTML, CSS" />
    <meta name="description" content="This is a sample HTML document." />
    <title>My Second Web Page</title>
    <style>
      em {
        color: red;
        font-style: normal;
      }
    </style>
  </head>
  <body>
    <p>This is a sample <em>paragraph</em>.</p>
    <!-- <em> is used to emphasize content in our HTML document. -->
    <p>This is a sample <i>paragraph</i>.</p>
    <!-- <i> is used to emphasize content in Italic in our HTML document. Also, <i> is deprecated and <em> should be used instead. -->
    <p>This is a sample <strong>paragraph</strong>.</p>
    <!-- <strong> is used to emphasize content in bold in our HTML document. -->
    <p>This is a sample <b>paragraph</b>.</p>
    <!-- <b> is used to emphasize content also in bold in our HTML document. Also, <b> is deprecated and <strong> should be used instead. -->
  </body>
</html>
